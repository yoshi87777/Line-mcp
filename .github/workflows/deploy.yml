name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run privacy & behavior tests
        run: npm test

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 45.32.55.165
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Line-mcp
            git pull
            npm install
            npm test
            pm2 restart line-webhook
            echo "Deploy complete: $(git rev-parse --short HEAD)"
